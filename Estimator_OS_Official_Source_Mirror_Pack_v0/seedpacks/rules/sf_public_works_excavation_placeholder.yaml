schema_version: 1.0.0
rule_code: sf_public_works_excavation_placeholder
rule_name: SF Public Works Excavation / ROW Permit Placeholder
version: 2026-01-01
status: active
jurisdiction_scope:
  state: CA
  region: Bay Area
  counties: [San Francisco]
  cities: [San Francisco]
  project_types: [utility, streetscape, sitework, public_works]
  public_works_only: false
effective:
  effective_start: 2026-01-01
sources:
  - source_id: sf_public_works_permits
    title: San Francisco Public Works Permit Center
    url: https://www.sfpublicworks.org/services/permits
    source_type: official_page
    retrieved_at: 2026-03-29T00:00:00Z
inputs:
  - key: opportunity.jurisdiction_preset
    type: enum
    required: true
    label: Jurisdiction
    enum_values: [sf, oakland, san_mateo_county, caltrans, custom]
    ui_component: hidden
  - key: inputs.requires_row
    type: boolean
    required: true
    label: Requires right-of-way or street occupancy
    ui_component: checkbox
  - key: inputs.excavation_area_sqft
    type: number
    required: false
    label: Excavation area
    ui_component: number
applicable_if:
  and:
    - "==": [ {var: opportunity.jurisdiction_preset}, "sf" ]
    - {var: inputs.requires_row}
outputs:
  line_items:
    - when: {"always": true}
      section_key: permits
      description: SF Public Works excavation / ROW permit placeholder
      pricing_mode: placeholder
      uom: ls
      notes: Confirm permit, inspection, and traffic / parking impacts against current Public Works guidance.
  proposal_notes:
    - when: {"always": true}
      text: Proposal assumes right-of-way / street occupancy permitting will be coordinated through San Francisco Public Works where applicable.
      audience: proposal_external
      placement_key: permitting_assumptions
  derived_fields: []
  flags:
    - when: {"always": true}
      flag_code: row_permit_review_required
      label: Review SF Public Works permit assumptions before publish
      severity: warning
blockers: []
